<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나그네 - 전체 카드</title>
    <style>
        /* A4 용지 가로(Landscape) */
        @page { size: A4 landscape; margin: 0; }

        body { 
            margin: 0; padding: 0; 
            background-color: #555; 
            font-family: 'Pretendard', sans-serif; 
            -webkit-print-color-adjust: exact; 
            print-color-adjust: exact; 
        }

        /* A4 가로 도화지 설정 */
        .page {
            width: 297mm;
            height: 210mm;
            background: white;
            box-sizing: border-box;
            page-break-after: always;
            position: relative;
            overflow: hidden; 
            
            /* 정중앙 배치 수학 계산 (간격 2mm 기준)
               - 그리드 너비: (52*4) + (2*3) = 214mm -> 좌우 여백: (297-214)/2 = 41.5mm
               - 그리드 높이: (88*2) + 2 = 178mm -> 상하 여백: (210-178)/2 = 16mm 
            */
            padding-top: 16mm;
            padding-left: 41.5mm;
        }

        @media screen {
            .page { margin: 10mm auto; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        }

        @media print {
            body { background: white; }
            .page { margin: 0 !important; box-shadow: none !important; }
        }

        /* 위아래 짝꿍 맞추기 & 간격 2mm로 수정 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, 52mm); 
            grid-template-rows: repeat(2, 88mm);    
            grid-auto-flow: column; /* '위 -> 아래'로 채움 */
            gap: 2mm; /* 3mm -> 2mm로 변경 */
        }

        /* 카드 기본 규격 */
        .card {
            width: 52mm;
            height: 88mm;
            border: 0.1mm solid #000;
            border-radius: 3mm;
            box-sizing: border-box;
            background: white;
            position: relative;
            padding: 2mm;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- 내부 디자인 --- */
        .card-front {
            display: flex; flex-direction: column;
            height: 100%; overflow: hidden; text-align: center;
        }

        .card-title {
            font-size: 1.25rem; margin: 0 0 3px 0;
            font-weight: bold; flex-shrink: 0;
        }

        .illustration-box {
            width: 100%; flex: 1 1 0; min-height: 0;
            background-color: #e8e8e8;
            background-size: cover; background-position: center;
            position: relative; border-radius: 3px;
        }

        .description {
            font-size: 0.75rem; line-height: 1.3;
            padding: 3px 0; word-break: keep-all; flex-shrink: 0;
        }

        .alignment-badge {
            position: absolute; top: 4px; right: 4px;
            padding: 2px 6px; border-radius: 4px;
            font-size: 0.75rem; color: white;
            font-weight: bold;
        }
        .alignment-badge.good    { background-color: #3498db; }
        .alignment-badge.evil    { background-color: #e74c3c; }
        .alignment-badge.neutral { background-color: #888; }

        .resource-bar {
            font-size: 1.1rem; display: flex;
            justify-content: center; gap: 6px;
            padding-bottom: 2px; flex-shrink: 0;
        }

        /* 접었을 때 똑바로 보이도록 뒷면 180도 회전 */
        .card-back {
            width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transform: rotate(180deg);
        }
    </style>
</head>

const CARDS_PER_PAGE = 4; // 1페이지당 4쌍(8장)
const pagesContainer = document.getElementById('pagesContainer');

function createPageGrid() {
    const page = document.createElement('div');
    page.className = 'page';
    
    const grid = document.createElement('div');
    grid.className = 'card-grid';
    
    page.appendChild(grid);
    pagesContainer.appendChild(page);
    return grid; 
}

function renderCard(data) {
    const hasAlignment = data.alignment !== undefined;
    const badgeClass = data.alignment === '선' ? 'good'
                     : data.alignment === '악' ? 'evil' : 'neutral';
    const badge = hasAlignment
        ? `<span class="alignment-badge ${badgeClass}">${data.alignment}</span>` : '';

    const coin = data.coin || 0;
    const soul = data.soul || 0;
    const resourceBar = (coin > 0 || soul > 0)
        ? `<div class="resource-bar"><span>${'🪙'.repeat(coin)}</span><span>${'🧿'.repeat(soul)}</span></div>`
        : '';

    // 앞면 출력 후 뒷면 출력
    return `
        <div class="card">
            <div class="card-front">
                <h2 class="card-title">${data.title}</h2>
                <div class="illustration-box" style="background-image:url('./image/${data.illustration}')">
                    ${badge}
                </div>
                <div class="description">${data.content}</div>
                ${resourceBar}
            </div>
        </div>
        <div class="card" style="padding: 0;">
            <div class="card-back" style="background-image:url('./image/${data.back}');"></div>
        </div>`;
}

let currentGrid = null;
allCards.forEach((data, index) => {
    if (index % CARDS_PER_PAGE === 0) {
        currentGrid = createPageGrid();
    }
    currentGrid.innerHTML += renderCard(data);
});
</script>
