<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나그네 - 전체 카드</title>
    <style>
        @page { size: A4; margin: 0; }

        body { margin: 0; padding: 0; background-color: #f0f0f0; font-family: 'Pretendard', sans-serif; }

        @media print {
            body { background: none; }
            .page {
                box-shadow: none !important;
                margin: 0 !important;
                padding: 2mm !important;
                width: 210mm !important;
                height: 297mm !important;
                grid-gap: 0mm 1mm !important;
                page-break-after: always;
            }
            .page:last-child { page-break-after: avoid; }
            .card              { height: 46mm !important; }
            .content-container { width: 46mm !important; }
        }

        .page {
            width: 210mm; height: 297mm;
            padding: 3mm; margin: 5mm auto;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: repeat(2, 83mm);
            grid-gap: 0.5mm 1mm;
            justify-content: center;
            align-content: start;
            box-sizing: border-box;
        }

        .card {
            width: 83mm; height: 48mm;
            border: 0.1mm solid #000;
            border-radius: 3mm;
            overflow: hidden;
            position: relative;
            box-sizing: border-box;
            background: white;
        }

        .content-container {
            width: 48mm; height: 83mm;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
            display: flex; flex-direction: column;
            padding: 2mm; box-sizing: border-box;
            overflow: hidden;
        }

        .card-front {
            display: flex; flex-direction: column;
            height: 100%; overflow: hidden; text-align: center;
        }

        .card-title {
            font-size: 1.2rem; margin: 0 0 3px 0;
            font-weight: bold; flex-shrink: 0;
        }

        .illustration-box {
            width: 100%; flex: 1 1 0; min-height: 0;
            background-color: #e8e8e8;
            background-size: cover; background-position: center;
            position: relative; border-radius: 3px;
        }

        .description {
            font-size: 0.70rem; line-height: 1.25;
            padding: 3px 0; word-break: keep-all; flex-shrink: 0;
        }

        .alignment-badge {
            position: absolute; top: 4px; right: 4px;
            padding: 1px 6px; border-radius: 4px;
            font-size: 0.75rem; color: white;
        }
        .alignment-badge.good    { background-color: #3498db; }
        .alignment-badge.evil    { background-color: #e74c3c; }
        .alignment-badge.neutral { background-color: #888; }

        .resource-bar {
            font-size: 1.1rem; display: flex;
            justify-content: center; gap: 6px;
            padding-bottom: 2px; flex-shrink: 0;
        }

        .card-back {
            width: 100%; height: 100%;
            transform: rotate(180deg);
            background-size: cover; background-position: center;
        }
    </style>
</head>
<body>
<div id="pagesContainer"></div>

const CARDS_PER_PAGE = 5;
const pagesContainer = document.getElementById('pagesContainer');

function createPage() {
    const page = document.createElement('div');
    page.className = 'page';
    pagesContainer.appendChild(page);
    return page;
}

function renderCard(data) {
    const hasAlignment = data.alignment !== undefined;
    const badgeClass = data.alignment === '선' ? 'good'
                     : data.alignment === '악' ? 'evil' : 'neutral';
    const badge = hasAlignment
        ? `<span class="alignment-badge ${badgeClass}">${data.alignment}</span>` : '';

    const coin = data.coin || 0;
    const soul = data.soul || 0;
    const resourceBar = (coin > 0 || soul > 0)
        ? `<div class="resource-bar"><span>${'🪙'.repeat(coin)}</span><span>${'🧿'.repeat(soul)}</span></div>`
        : '';

    return `
        <div class="card"><div class="content-container">
            <div class="card-back" style="background-image:url('./image/${data.back}');"></div>
        </div></div>
        <div class="card"><div class="content-container">
            <div class="card-front">
                <h2 class="card-title">${data.title}</h2>
                <div class="illustration-box" style="background-image:url('./image/${data.illustration}')">
                    ${badge}
                </div>
                <div class="description">${data.content}</div>
                ${resourceBar}
            </div>
        </div></div>`;
}

let currentPage = null;
allCards.forEach((data, index) => {
    if (index % CARDS_PER_PAGE === 0) currentPage = createPage();
    currentPage.innerHTML += renderCard(data);
});
</script>
</body>
</html>
