<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나그네</title>
    <style>
        @page {
            size: A4;
            margin: 0;
            margin-top: 0;
            margin-bottom: 0;
        }
        body { margin: 0; padding: 0; background-color: #f0f0f0; font-family: 'Pretendard', sans-serif; }

        @media print {
            body { background: none; }
            .page {
                box-shadow: none !important;
                border: none !important;
                outline: none !important;
                margin: 0 !important;
                padding: 2mm !important;
                width: 210mm !important;
                height: 297mm !important;
                grid-gap: 0mm 1mm !important; /* 세로 gap 제거 */
                page-break-after: always;
            }
            .page:last-child { page-break-after: avoid; }
            /* 인쇄 시 카드 높이 축소: 5행 × 46mm + gap 0 = 230mm < 293mm */
            .card {
                height: 46mm !important;
            }
            .content-container {
                width: 46mm !important;
            }
        }

        .page {
            width: 210mm; height: 297mm; padding: 3mm; margin: 5mm auto;
            background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: grid; grid-template-columns: repeat(2, 83mm);
            grid-gap: 0.5mm 1mm; justify-content: center; align-content: start; box-sizing: border-box;
        }

        /* 카드: 83mm × 48mm */
        .card {
            width: 83mm; height: 48mm;
            border: 0.1mm solid #000; border-radius: 3mm;
            overflow: hidden; position: relative; box-sizing: border-box;
            background: white;
        }

        /* 90도 회전 컨테이너 */
        .content-container {
            width: 48mm; height: 83mm;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
            display: flex; flex-direction: column;
            padding: 2mm; box-sizing: border-box;
            overflow: hidden;
        }

        /* 앞면 */
        .card-front {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            text-align: center;
        }

        .job-title {
            font-size: 1.2rem;
            margin: 0 0 3px 0;
            font-weight: bold;
            flex-shrink: 0;
        }

        .illustration-box {
            width: 100%;
            flex: 1 1 0;       /* 남은 공간만큼만 차지, 기준값 0 */
            min-height: 0;     /* flex 자식 기본 min-height 제거 */
            background-color: #f0f0f0;
            background-size: cover;
            background-position: center;
            position: relative;
            border-radius: 3px;
        }

        .description {
            font-size: 0.72rem;
            line-height: 1.2;
            padding: 3px 0;
            word-break: keep-all;
            flex-shrink: 0;    /* 고정 크기 유지 */
        }

        .alignment-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            color: white;
        }

        .alignment-badge.good { background-color: #3498db; }
        .alignment-badge.evil { background-color: #e74c3c; }
        .alignment-badge.neutral { background-color: #888; }

        .resource-bar {
            font-size: 1.1rem;
            display: flex;
            justify-content: center;
            gap: 6px;
            padding-bottom: 2px;
            flex-shrink: 0;    /* 고정 크기 유지 */
        }

        /* 뒷면 */
        .card-back {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            transform: rotate(180deg);
            background-size: cover;
            background-position: center;
        }

        .logo-box {
            border: 1.5px solid #ffd700; padding: 3mm 6mm;
            text-align: center; color: #ffd700;
        }

        .logo-box .brand {
            font-weight: bold; font-size: 10pt; letter-spacing: 1.5px;
            display: block; line-height: 1.2;
        }
    </style>
</head>
<body>

<div id="pagesContainer"></div>

<script>
    const cardData = [
        {

            "alignment": "악",
            "coin": 1,
            "soul": 1,
            "illustration": "merchant2.png"
        },
        {

            "content": "위험 길손(창귀·호랑이·산적) 없이 통과",
            "alignment": "선",
            "coin": 2,
            "soul": 0,
            "illustration": "merchant1.png"
        },
        {
            "title": "보부상",
            "content": "위험 길손(창귀·호랑이·산적) 없이 통과",
            "alignment": "악",
            "coin": 2,
            "soul": 0,
            "illustration": "merchant2.png"
        },
        {
            "title": "보부상",
            "content": "위험 길손(창귀·호랑이·산적) 없이 통과",
            "alignment": "선",
            "coin": 3,

        },
        {
            "title": "보부상",
            "content": "위험 길손(창귀·호랑이·산적) 없이 통과",
            "alignment": "악",
            "coin": 3,
            "soul": 0,
            "illustration": "merchant2.png"
        },
        {

            "alignment": "선",

        {

        {

        {

            "content": "5인 이상 전용, 등짐꾼·밀수꾼 찾아내어 영혼 뺏기 (나머지에게 무력)",
            "alignment": "-",
            "coin": 0,
            "soul": 1,
            "illustration": "ghost.png"
        }
    ];

    const CARDS_PER_PAGE = 5;
    const pagesContainer = document.getElementById('pagesContainer');

    function createPage() {
        const page = document.createElement('div');
        page.className = 'page';
        pagesContainer.appendChild(page);
        return page;
    }

    function createCardHtml(data) {
        const coinIcons = '🪙'.repeat(data.coin);
        const soulIcons = '🧿'.repeat(data.soul);

        const badgeClass = data.alignment === '선' ? 'good'
                         : data.alignment === '악' ? 'evil'
                         : 'neutral';

        // resource-bar: 아이콘이 하나도 없으면 빈 줄 없애기
        const resourceBar = (data.coin > 0 || data.soul > 0)
            ? `<div class="resource-bar">
                <span class="coins">${coinIcons}</span>
                <span class="souls">${soulIcons}</span>
               </div>`
            : '';

        return `
            <div class="card">
                <div class="content-container">
                    <div class="card-back" style="background-image: url('./image/way_back.png');"></div>
                </div>
            </div>
            <div class="card">
                <div class="content-container">
                    <div class="card-front">
                        <h2 class="job-title">${data.title}</h2>
                        <div class="illustration-box" style="background-image: url('./image/${data.illustration}')">
                            <span class="alignment-badge ${badgeClass}">${data.alignment}</span>
                        </div>
                        <div class="description">${data.content}</div>
                        ${resourceBar}
                    </div>
                </div>
            </div>
        `;
    }

    let currentPage = null;
    cardData.forEach((data, index) => {
        if (index % CARDS_PER_PAGE === 0) {
            currentPage = createPage();
        }
        currentPage.innerHTML += createCardHtml(data);
    });
</script>
</body>
</html>
